name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Typecheck, test, build
    runs-on: ubuntu-latest
    # Secrets surfaced as job-level env so the build step's `if` can gate on them.
    # metadataBase falls back to localhost, so NEXT_PUBLIC_BASE_URL is optional.
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # `postinstall` runs `prisma generate`, so the client is available after install.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      # Production build runs only when DB/auth secrets are configured
      # (repo Settings -> Secrets and variables -> Actions). Skipped otherwise
      # so CI stays green on PRs/forks without secrets.
      - name: Build
        if: ${{ env.DATABASE_URL != '' }}
        run: pnpm build
